<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Green Space ☁️🍃</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-pastel: #B3E5FC;
            --green-pastel: #C8E6C9;
            --bg-color: #FDFCF0;
            --text-color: #546E7A;
            --book-width: 340px; 
            --book-height: 500px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Mali', cursive;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-color);
            overflow: hidden;
        }

        .book-container {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            perspective: 1500px;
        }

        .page {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1), z-index 0s 0.3s;
            transform-origin: left;
            backface-visibility: hidden;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* สถานะการพลิกหน้า */
        .page.flipped {
            transform: rotateY(-180deg);
            z-index: 0;
        }

        /* ลำดับหน้ากระดาษ */
        #page1 { z-index: 3; }
        #page2 { z-index: 2; }
        #page3 { z-index: 1; }

        .content {
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        /* Spotify Page Style */
        .spotify-bg {
            background: linear-gradient(135deg, var(--blue-pastel), var(--green-pastel));
        }

        .album-art {
            width: 160px; height: 160px;
            background: white; border-radius: 20px;
            margin-bottom: 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .controls-row {
            display: flex; gap: 15px; margin: 15px 0;
        }

        .btn-circle {
            background: white; border: none;
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .lyrics-box {
            height: 80px; font-weight: bold; font-size: 15px;
            line-height: 1.4; margin-top: 10px; color: #37474F;
        }

        .nav-btn {
            background: rgba(0,0,0,0.05); border: none;
            padding: 10px 20px; border-radius: 20px;
            font-family: 'Mali'; cursor: pointer;
            margin-top: auto; font-size: 12px;
        }

        .nav-btn:hover { background: rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <audio id="audio" src="scrubb.mp3"></audio>

    <div class="book-container">
        
        <div class="page" id="page3">
            <div class="content">
                <h3 style="margin-top:0;">จากใจยัยตัวแสบ... 💙</h3>
                <p style="font-size: 14px; line-height: 1.8;">
                    ขอบคุณที่อยู่ "คู่กัน" มาถึงตอนนี้นะ<br>
                    เค้ารู้ตัวว่าเค้าชอบงอนเรื่องไร้สาระบ่อยๆ<br>
                    แต่เธอก็ยังเป็นพื้นที่สีเขียวที่เย็นฉ่ำให้เค้าเสมอ
                </p>
                <p style="font-size: 14px; font-weight: bold;">รักเธอที่สุดเลยนะคนดี</p>
                <div style="font-size: 40px; margin-top: 10px;">🍃☁️💙</div>
                <button class="nav-btn" onclick="prevPage(2)">⬅️ ย้อนกลับไปฟังเพลง</button>
            </div>
        </div>

        <div class="page spotify-bg" id="page2">
            <div class="content">
                <div class="album-art">🎶</div>
                <div style="font-weight: bold; font-size: 20px;">คู่กัน</div>
                <div style="font-size: 13px; opacity: 0.8;">Scrubb</div>

                <div class="controls-row">
                    <button id="play-pause-btn" class="btn-circle" style="font-size: 20px;">▶</button>
                    <button id="stop-btn" class="btn-circle" style="font-size: 14px;">⬛</button>
                </div>

                <div class="lyrics-box" id="lyrics-display">
                    กดปุ่มเพื่อเริ่มฟังนะ...
                </div>

                <div style="display: flex; gap: 10px; width: 100%; justify-content: center;">
                    <button class="nav-btn" onclick="prevPage(1)">⬅️ กลับหน้าปก</button>
                    <button class="nav-btn" onclick="nextPage(2)">อ่านข้อความ ➡️</button>
                </div>
            </div>
        </div>

        <div class="page" id="page1">
            <div class="content">
                <div style="font-size: 70px;">📔</div>
                <h2 style="margin: 10px 0;">บันทึกของสีฟ้า</h2>
                <p style="opacity: 0.6; font-size: 14px;">ถึง พื้นที่สีเขียวของเค้า</p>
                <br>
                <button class="nav-btn" style="background: var(--blue-pastel);" onclick="nextPage(1)">เปิดอ่านบันทึก ➡️</button>
            </div>
        </div>

    </div>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const lyricDisplay = document.getElementById('lyrics-display');

        const lyrics = [
            { time: 0, text: "🎵 เตรียมฟังเพลงคู่กันนะ..." },
            { time: 13, text: "เดินผ่าน มองคนไม่รู้จัก..." },
            { time: 17, text: "วนเวียนและเป็นอยู่..." },
            { time: 20, text: "ดูไปก็รู้สึก อย่างเคย เหมือนเคย" },
            { time: 26, text: "ลองมองผ่าน ความทรงจำที่มีอยู่" },
            { time: 30, text: "คงมีเพียงฉันคนหนึ่ง คนเดียวที่รู้จัก" },
            { time: 35, text: "อย่างเดิม เหมือนเดิม..." },
            { time: 42, text: "วันเดือนปีเคยเป็นแค่เพียงสายลมผ่าน" },
            { time: 47, text: "ใครคนหนึ่งทำเวลาฉันให้รู้สึกมีความหมาย" },
            { time: 54, text: "คนๆ หนึ่งได้เปลี่ยนแปลงทุกๆ อย่างไป" },
            { time: 59, text: "คนที่ทำให้ยิ้มได้ ไม่ว่าเราจะเศร้าเพียงไหน" },
            { time: 66, text: "เธอคนหนึ่ง ทำให้รักฉันเปลี่ยนไป" },
            { time: 71, text: "ก็ไม่รู้ไม่เข้าใจ อาจเป็นเพราะคู่กัน..." }
        ];

        // ฟังก์ชันพลิกหน้าไปข้างหน้า
        function nextPage(pageNum) {
            document.getElementById('page' + pageNum).classList.add('flipped');
        }

        // ฟังก์ชันพลิกหน้าย้อนกลับ
        function prevPage(pageNum) {
            document.getElementById('page' + pageNum).classList.remove('flipped');
        }

        // ระบบควบคุมเพลง
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerText = '⏸';
            } else {
                audio.pause();
                playPauseBtn.innerText = '▶';
            }
        });

        stopBtn.addEventListener('click', () => {
            audio.pause();
            audio.currentTime = 0;
            playPauseBtn.innerText = '▶';
            lyricDisplay.innerText = "เริ่มฟังใหม่อีกครั้งนะ...";
        });

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            const currentLyric = lyrics.findLast(l => currentTime >= l.time);
            if (currentLyric && lyricDisplay.innerText !== currentLyric.text) {
                lyricDisplay.style.opacity = 0;
                setTimeout(() => {
                    lyricDisplay.innerText = currentLyric.text;
                    lyricDisplay.style.opacity = 1;
                }, 150);
            }
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.innerText = '▶';
            lyricDisplay.innerText = "ขอบคุณที่ฟังจนจบนะ... หายงอนเค้านะ 💚";
        });
    </script>
</body>
</html>
